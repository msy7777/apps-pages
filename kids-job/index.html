<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>お手伝い記録</title>
  <meta name="description" content="子どものお手伝いとお小遣いを記録するアプリ" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#F2F2F7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="お手伝い記録" />
  <link rel="apple-touch-icon" href="icon-180.png" />

  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #F2F2F7; overscroll-behavior: none; }
    #root { height: 100%; }
    * { -webkit-tap-highlight-color: transparent; }
    input, button, textarea { -webkit-appearance: none; appearance: none; }
  </style>

  <script>
    /* エラーが起きたら画面に表示（スマホで原因を確認できるように） */
    window.addEventListener("error", function (e) {
      var el = document.createElement("div");
      el.style.cssText = "position:fixed;left:8px;right:8px;bottom:8px;z-index:99999;background:#FFF3F3;color:#C0392B;border:1px solid #E74C3C;border-radius:10px;padding:10px 12px;font-size:12px;font-family:monospace;word-break:break-all;";
      el.textContent = "エラー: " + (e.message || "") + " @" + (e.filename || "").split("/").pop() + ":" + (e.lineno || "");
      document.body.appendChild(el);
    });
  </script>

  <script src="vendor-react.js"></script>
  <script src="vendor-react-dom.js"></script>
  <script src="vendor-firebase-app.js"></script>
  <script src="vendor-firebase-firestore.js"></script>
</head>
<body>
  <div id="root"></div>

  <script src="app.js"></script>


  <script>
    if ("serviceWorker" in navigator) {
      let reloaded = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
